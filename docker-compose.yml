services:
  # --- 1. LE BACKEND ---
  lab-docker-back-service:
    # On explique à Compose comment construire l'image s'il la perd
    build:
      context: .
      dockerfile: Dockerfile.back
    image: lab-docker-rkla-back-img:latest
    expose:
      - "5000"
    environment:
      - CURRENT_ENVIRONMENT=DEV

  # --- 2. LE FRONTEND ---
  lab-docker-front-service:
    # On explique à Compose d'aller dans le sous-dossier app/front
    build:
      context: ./app/front
      dockerfile: Dockerfile.front
    image: lab-docker-rkla-front-img:latest
    ports:
      - "8083:80"
    environment:
      - TR_WS_BACK_URL="http://localhost:8080/"

  # --- 3. LE CHEF D'ORCHESTRE (Nginx) ---
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      start_period: 15s
      interval: 5m
      timeout: 15s
      retries: 3
    restart: unless-stopped
    depends_on:
      - lab-docker-back-service